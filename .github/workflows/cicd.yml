name: CI/CD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (optional, z.B. 1.0.0) – leer lassen für :latest only'
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            cheinisch/ownpass:latest
            ${{ inputs.version != '' && format('cheinisch/ownpass:{0}', inputs.version) || '' }}