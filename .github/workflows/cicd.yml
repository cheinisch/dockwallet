name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Append -dev to backend version
        run: |
          cd backend
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = pkg.version.replace(/-dev$/, '') + '-dev';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Backend version:', pkg.version);
          "

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6.3.0
        with:
          context: ./backend
          push: true
          tags: cheinisch/dockwallet-backend:dev

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Append -dev to frontend version
        run: |
          cd frontend
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = pkg.version.replace(/-dev$/, '') + '-dev';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Frontend version:', pkg.version);
          "

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6.3.0
        with:
          context: ./frontend
          push: true
          tags: cheinisch/dockwallet-frontend:dev